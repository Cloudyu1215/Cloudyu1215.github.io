<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>你的名字 | Homepage</title>

  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;700;900&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      text-align: left;
      font-size: 16px;
      font-family: Georgia, "Times New Roman", Times, serif;
      color: black;
      background-color: white;
    }

    h1 {
      margin: 20px 0 0 0;
      font-size: 150%;
      line-height: normal;
      font-weight: 900;
      color: black;
    }

    p {
      margin: 0 0 15px 0;
      line-height: 24px;
    }

    a:link { color: #0000EE; }
    a:visited { color: #551A8B; }
    a:hover { text-decoration: underline; }

    img {
      border: 2px solid #555;
    }

    #Header {
      margin-left: auto;
      margin-right: auto;
      padding: 30px;
      max-width: 1024px;
      background-color: white;
    }

    #TopSection {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      align-items: flex-start;
    }

    #Photo {
      flex: 0 0 160px;
    }

    #Info {
      flex: 1;
      text-align: right;
      min-width: 240px;
    }

    #ShortBio {
      margin-left: auto;
      margin-right: auto;
      padding: 0;
      text-align: justify;
    }

    .links {
      text-align: center;
    }

    @media (max-width: 700px) {
      #TopSection {
        flex-direction: column;
      }

      #Info {
        text-align: left;
      }
    }
  </style>
</head>
<body>

  <div id="Header">

    <div id="TopSection">
      <div id="Photo">
        <img src="files/profile.jpg" alt="profile photo" width="150">
      </div>

      <div id="Info">
        <h1>Yiqiang Zhou</h1>
        <br>
        M.S. Student<br>
        Northeast Forestry University<br>
        <br>

      </div>
    </div>

    <br>
    <hr>

    <p class="links">
      [<a href="#">CV</a>]
      [<a href="#">Projects</a>]
      [<a href="#">Blog</a>]
      [<a href="#">Contact</a>]
    </p>

    <hr>

    <p><em>        I am currently seeking PhD positions.</em></p>

    <hr>

    <div id="ShortBio">
      <p>
        <!-- 我是某某学校/公司的某某，目前主要从事某某方向的研究/开发工作。 -->
      </p>

      <p>
        <!-- 我的兴趣包括 A、B、C。最近主要关注某个具体主题，也在做某些项目。 -->

</body>
</html>
