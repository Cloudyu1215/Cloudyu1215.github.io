<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloudy Today</title>
  <style>
    :root {
      --bg: #e9eef4;
      --panel: #f5f7fa;
      --panel-2: #e1e8ef;
      --card: #ffffff;
      --text: #334155;
      --muted: #64748b;
      --line: #d8e1ea;
      --accent: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #eef3f7 0%, #dde6ee 100%);
    }

    .page {
      min-height: 100vh;
      padding: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .layout {
      width: min(1120px, 100%);
      min-height: 760px;
      border-radius: 32px;
      background: var(--panel);
      border: 1px solid var(--line);
      overflow: hidden;
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      box-shadow: 0 24px 60px rgba(100, 116, 139, 0.12);
    }

    .left {
      padding: 56px;
      background: linear-gradient(180deg, #f6f8fb 0%, #edf2f7 100%);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-mark {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: #c7d2de;
    }

    .hero {
      max-width: 620px;
    }

    .tag {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      background: #e8eef5;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0.08em;
      margin-bottom: 28px;
      border: 1px solid #d6e0ea;
    }

    h1 {
      font-size: clamp(52px, 8vw, 96px);
      line-height: 0.95;
      letter-spacing: -0.05em;
      font-weight: 700;
      color: #2f3f50;
    }

    .desc {
      margin-top: 28px;
      max-width: 560px;
      font-size: 16px;
      line-height: 1.9;
      color: #5b6b7c;
    }

    .bottom {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 20px;
      align-items: end;
      margin-top: 56px;
    }

    .note {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.9;
    }

    .stat {
      background: #e7edf4;
      border: 1px solid #d3dde8;
      border-radius: 24px;
      padding: 22px;
      text-align: right;
    }

    .stat span {
      display: block;
      font-size: 12px;
      color: #7b8b9b;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .stat strong {
      font-size: 30px;
      color: #314252;
      font-weight: 600;
    }

    .right {
      background: linear-gradient(180deg, #e7edf3 0%, #dce5ee 100%);
      border-left: 1px solid var(--line);
      padding: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .weather-card {
      width: min(360px, 100%);
      aspect-ratio: 0.9 / 1.08;
      background: var(--card);
      border: 1px solid #d8e1ea;
      border-radius: 32px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 16px 40px rgba(100, 116, 139, 0.1);
    }

    .mini-title {
      font-size: 13px;
      color: #728396;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .art {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      min-height: 280px;
    }

    .circle {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: #eef3f7;
      border: 1px solid #d8e1ea;
    }

    .cloud {
      position: relative;
      width: 190px;
      height: 72px;
      background: #cbd7e3;
      border-radius: 999px;
      z-index: 2;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: #cbd7e3;
    }

    .cloud::before {
      width: 84px;
      height: 84px;
      left: 24px;
      top: -38px;
    }

    .cloud::after {
      width: 68px;
      height: 68px;
      right: 26px;
      top: -24px;
    }

    .cloud-small {
      position: absolute;
      width: 116px;
      height: 42px;
      background: #dde5ee;
      border-radius: 999px;
      right: 46px;
      bottom: 58px;
      z-index: 1;
    }

    .cloud-small::before,
    .cloud-small::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: #dde5ee;
    }

    .cloud-small::before {
      width: 44px;
      height: 44px;
      left: 14px;
      top: -18px;
    }

    .cloud-small::after {
      width: 36px;
      height: 36px;
      right: 14px;
      top: -10px;
    }

    .card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
    }

    .temp {
      font-size: 40px;
      color: #314252;
      font-weight: 600;
      letter-spacing: -0.04em;
    }

    .sub {
      margin-top: 6px;
      color: #6f8193;
      font-size: 14px;
    }

    .meta {
      text-align: right;
      color: #7c8c9c;
      font-size: 14px;
      line-height: 1.8;
    }

    @media (max-width: 920px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .right {
        border-left: 0;
        border-top: 1px solid var(--line);
      }

      .left,
      .right {
        padding: 28px;
      }

      .bottom {
        grid-template-columns: 1fr;
      }

      .stat {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="layout">
      <div class="left">
        <div>
          <div class="topbar">
            <div class="brand"><span class="brand-mark"></span> Personal Page</div>
            <div>Theme / Cloudy Today</div>
          </div>

          <div class="hero">
            <div class="tag">今日多云 / Flat Personal Landing Page</div>
            <h1>Cloudy</h1>
            <p class="desc">
              一个安静、留白、偏灰蓝色调的个人主页首页。
              页面不展示名字，不使用动态效果，只保留扁平化的天气意象与清爽版式，
              适合作为后续继续添加简介、作品或联系方式的基础页面。
            </p>
          </div>
        </div>

        <div class="bottom">
          <p class="note">
            这里暂时保持克制与空白。
            等你后面想加入内容时，可以继续扩展为个人简介页、作品集首页，或者极简名片页。
          </p>

          <div class="stat">
            <span>Current Mood</span>
            <strong>Cloudy</strong>
          </div>
        </div>
      </div>

      <div class="right">
        <div class="weather-card">
          <div class="mini-title">Weather Graphic</div>

          <div class="art">
            <div class="circle"></div>
            <div class="cloud"></div>
            <div class="cloud-small"></div>
          </div>

          <div class="card-bottom">
            <div>
              <div class="temp">22°</div>
              <div class="sub">多云，安静，平缓</div>
            </div>
            <div class="meta">
              Static Layout<br />
              Flat Design
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
